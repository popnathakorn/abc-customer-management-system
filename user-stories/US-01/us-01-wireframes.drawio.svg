<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="2200" height="1600" viewBox="0 0 2200 1600">
  <title>US-01 Register New Customer Wireframes</title>
  <desc>Wireframes derived from US-01 user journey: authentication, customer management, registration form, validation, and success confirmation.</desc>

  <defs>
    <style>
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .header { fill: #f3f4f6; stroke: #1f2937; stroke-width: 2; }
      .field { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; }
      .btn { fill: #e5e7eb; stroke: #374151; stroke-width: 1.5; rx: 6; ry: 6; }
      .btn-primary { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.5; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #374151; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #111827; }
      .screen { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #111827; }
      .error { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #b91c1c; }
      .ok { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #065f46; }
      .warn { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #b45309; }
      .arrow-label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #1d4ed8; fill-opacity: 0.25; }
      .arrow { stroke: #4b5563; stroke-width: 2.5; stroke-opacity: 0.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563" fill-opacity="0.5"/>
    </marker>
  </defs>

  <text x="50" y="55" class="title">US-01 Wireframes — Register New Customer</text>
  <text x="50" y="85" class="small">Flow: Login → Customer Management → Register Form → Validation Errors → Success with Customer ID</text>

  <!-- Screen 1: Login -->
  <rect x="50" y="130" width="1000" height="420" class="panel"/>
  <rect x="50" y="130" width="1000" height="60" class="header"/>
  <text x="75" y="168" class="screen">Screen 1 — Login</text>
  <text x="480" y="250" class="label">Sign In</text>
  <text x="220" y="300" class="label">Username *</text>
  <rect x="430" y="275" width="420" height="40" class="field"/>
  <text x="220" y="360" class="label">Password *</text>
  <rect x="430" y="335" width="420" height="40" class="field"/>
  <text x="430" y="405" class="small">☐ Remember me</text>
  <rect x="450" y="445" width="180" height="44" class="btn btn-primary"/>
  <text x="510" y="473" class="label">Log In</text>

  <!-- Screen 2: Customer Management List -->
  <rect x="1150" y="130" width="1000" height="540" class="panel"/>
  <rect x="1150" y="130" width="1000" height="60" class="header"/>
  <text x="1175" y="168" class="screen">Screen 2 — Customer Management (List)</text>
  <text x="1180" y="225" class="label">Dashboard &gt; Customer Management</text>
  <rect x="1180" y="250" width="450" height="36" class="field"/>
  <text x="1192" y="274" class="small">Search customer...</text>
  <rect x="1650" y="250" width="170" height="36" class="field"/>
  <text x="1662" y="274" class="small">Status: All ▼</text>
  <rect x="1840" y="250" width="120" height="36" class="btn"/>
  <text x="1872" y="274" class="small">Search</text>
  <rect x="1180" y="310" width="220" height="42" class="btn btn-primary"/>
  <text x="1210" y="337" class="small">+ Add New Customer</text>

  <rect x="1180" y="375" width="940" height="250" class="field"/>
  <line x1="1180" y1="415" x2="2120" y2="415" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="1200" y="402" class="small">Customer ID</text>
  <text x="1370" y="402" class="small">Full Name</text>
  <text x="1620" y="402" class="small">Phone</text>
  <text x="1850" y="402" class="small">Last Updated</text>
  <text x="1200" y="450" class="small">CUS-000145</text>
  <text x="1370" y="450" class="small">Somchai A.</text>
  <text x="1620" y="450" class="small">08x-xxx-xxxx</text>
  <text x="1850" y="450" class="small">20/02/2026</text>
  <text x="1200" y="490" class="small">CUS-000146</text>
  <text x="1370" y="490" class="small">Suda P.</text>
  <text x="1620" y="490" class="small">09x-xxx-xxxx</text>
  <text x="1850" y="490" class="small">20/02/2026</text>

  <!-- Screen 3: Register Form -->
  <rect x="50" y="620" width="1000" height="940" class="panel"/>
  <rect x="50" y="620" width="1000" height="60" class="header"/>
  <text x="75" y="658" class="screen">Screen 3 — Register New Customer (Form)</text>

  <text x="80" y="710" class="label">Personal Information</text>
  <text x="80" y="750" class="small">Full Name *</text><rect x="330" y="725" width="640" height="34" class="field"/>
  <text x="80" y="790" class="small">Date of Birth</text><rect x="330" y="765" width="240" height="34" class="field"/>
  <text x="80" y="830" class="small">ID Card Number *</text><rect x="330" y="805" width="640" height="34" class="field"/>
  <text x="80" y="870" class="small">Phone Number *</text><rect x="330" y="845" width="640" height="34" class="field"/>
  <text x="80" y="910" class="small">Email Address</text><rect x="330" y="885" width="640" height="34" class="field"/>

  <text x="80" y="970" class="label">Registered Address</text>
  <text x="80" y="1010" class="small">House No. / Street *</text><rect x="330" y="985" width="640" height="34" class="field"/>
  <text x="80" y="1050" class="small">Province *</text><rect x="330" y="1025" width="300" height="34" class="field"/>
  <text x="80" y="1090" class="small">District *</text><rect x="330" y="1065" width="300" height="34" class="field"/>
  <text x="80" y="1130" class="small">Sub-district (ตำบล/แขวง) *</text><rect x="330" y="1105" width="300" height="34" class="field"/>
  <text x="80" y="1170" class="small">Postal Code *</text><rect x="330" y="1145" width="180" height="34" class="field"/>

  <text x="80" y="1230" class="label">Document Delivery Address</text>
  <text x="80" y="1265" class="small">☐ Same as registered address</text>
  <text x="80" y="1305" class="small">House No. / Street</text><rect x="330" y="1280" width="640" height="34" class="field"/>
  <text x="80" y="1345" class="small">Province</text><rect x="330" y="1320" width="300" height="34" class="field"/>
  <text x="80" y="1385" class="small">District</text><rect x="330" y="1360" width="300" height="34" class="field"/>
  <text x="80" y="1425" class="small">Sub-district (ตำบล/แขวง)</text><rect x="330" y="1400" width="300" height="34" class="field"/>
  <text x="80" y="1465" class="small">Postal Code</text><rect x="330" y="1440" width="180" height="34" class="field"/>

  <rect x="760" y="1490" width="95" height="40" class="btn"/><text x="785" y="1516" class="small">Cancel</text>
  <rect x="875" y="1490" width="95" height="40" class="btn btn-primary"/><text x="908" y="1516" class="small">Save</text>

  <!-- Screen 4: Validation Errors -->
  <rect x="1150" y="740" width="1000" height="360" class="panel"/>
  <rect x="1150" y="740" width="1000" height="60" class="header"/>
  <text x="1175" y="778" class="screen">Screen 4 — Validation Errors</text>
  <text x="1185" y="830" class="error">[!] Please correct highlighted fields before submission.</text>
  <text x="1185" y="875" class="small">Email Address: invalid-email-format</text>
  <text x="1185" y="900" class="error">^ Enter a valid email address</text>
  <text x="1185" y="940" class="small">Province: [ Select Province ▼ ]</text>
  <text x="1185" y="965" class="error">^ This field is required</text>
  <text x="1185" y="1005" class="small">Postal Code: 12A45</text>
  <text x="1185" y="1030" class="error">^ Postal code must be numeric</text>
  <rect x="1960" y="1045" width="80" height="34" class="btn"/><text x="1982" y="1067" class="small">Cancel</text>
  <rect x="2050" y="1045" width="80" height="34" class="btn btn-primary"/><text x="2076" y="1067" class="small">Save</text>

  <!-- Screen 5: Success -->
  <rect x="1150" y="1140" width="1000" height="380" class="panel"/>
  <rect x="1150" y="1140" width="1000" height="60" class="header"/>
  <text x="1175" y="1178" class="screen">Screen 5 — Success Confirmation</text>
  <text x="1185" y="1250" class="ok">[✓] Customer registration completed successfully</text>
  <text x="1185" y="1300" class="label">New Customer ID: CUS-000147</text>
  <text x="1185" y="1340" class="small">Full Name: Somchai Arun</text>
  <text x="1185" y="1370" class="small">Phone Number: 08x-xxx-xxxx</text>
  <rect x="1185" y="1420" width="260" height="42" class="btn"/><text x="1230" y="1447" class="small">View Customer Profile</text>
  <rect x="1470" y="1420" width="300" height="42" class="btn btn-primary"/><text x="1520" y="1447" class="small">Register Another Customer</text>

  <!-- Flow arrows -->
  <path d="M 1050 340 L 1140 340" class="arrow"/>
  <path d="M 1500 670 L 980 620" class="arrow"/>
  <path d="M 1050 1100 L 1140 920" class="arrow"/>
  <text x="1060" y="1005" class="arrow-label">Invalid data → Validation Errors</text>
  <path d="M 1050 1260 L 1140 1260" class="arrow"/>
  <text x="1060" y="1248" class="arrow-label">All valid → Success Confirmation</text>
  <path d="M 1650 1100 L 1650 1130" class="arrow"/>
  <path d="M 1750 1140 L 1750 680" class="arrow"/>
  <text x="1765" y="920" class="arrow-label">View Customer Profile</text>
  <path d="M 1150 1460 L 1060 1460" class="arrow"/>
  <text x="1080" y="1450" class="arrow-label">Register Another Customer</text>
</svg>
